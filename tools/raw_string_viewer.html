<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Raw String Viewer</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 40px auto;
      }
      textarea {
        width: 100%;
        height: 150px;
        margin-bottom: 20px;
      }
      pre {
        background: #f4f4f4;
        padding: 15px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h2>Raw String Viewer</h2>

    <p>Paste text below to reveal hidden characters like \n, \r, and \t.</p>

    <textarea id="input" placeholder="Paste text here..."></textarea>

    <h3>Output</h3>
    <pre id="output"></pre>

    <script>
      function showRaw(str) {
        return str
          .replace(/\\/g, "\\\\")
          .replace(/\r/g, "\\r")
          .replace(/\n/g, "\\n\n")
          .replace(/\t/g, "\\t");
      }

      const input = document.getElementById("input");
      const output = document.getElementById("output");

      input.addEventListener("input", () => {
        output.textContent = showRaw(input.value);
      });
    </script>
  </body>
</html>
